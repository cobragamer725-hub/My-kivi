name: Build Buntai AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build with Buildozer
      uses: ArtemisBandi/buildozer-action@v1
      with:
        buildozer_version: stable
        command: buildozer --verbose android debug
        repository_read_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Buntai-AI-APK
        path: bin/*.apk
        
